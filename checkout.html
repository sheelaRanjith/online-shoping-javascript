<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaCart | Checkout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="checkout">
  <div id="loading-overlay" class="loading-overlay"><div class="spinner"></div></div>

  <header class="site-header">
    <nav class="navbar container">
      <a href="index.html" class="logo">Nova<span>Cart</span></a>
      <div class="search-wrap">
        <input type="text" id="global-search" placeholder="Search products..." aria-label="Search products" />
      </div>
      <div class="nav-actions">
        <a href="products.html" class="btn btn-ghost">Products</a>
        <a href="cart.html" class="cart-link" aria-label="Cart">🛒 <span id="cart-count" class="badge">0</span></a>
      </div>
    </nav>
  </header>

  <main class="container section checkout-grid">
    <section class="panel">
      <h2>Checkout</h2>
      <form id="checkout-form" class="form-grid">
        <label>Name<input type="text" id="checkout-name" required /></label>
        <label>Address<textarea id="checkout-address" rows="3" required></textarea></label>
        <label>Phone<input type="tel" id="checkout-phone" required /></label>
        <label>Payment Method
          <select id="checkout-payment" required>
            <option value="">Select payment method</option>
            <option value="COD">Cash on Delivery</option>
            <option value="Card">Credit / Debit Card</option>
            <option value="UPI">UPI</option>
          </select>
        </label>
        <button class="btn btn-primary" type="submit">Place Order</button>
      </form>
    </section>

    <section class="panel">
      <h2>Order Summary</h2>
      <div id="checkout-summary"></div>
      <h3>Total: $<span id="checkout-total">0.00</span></h3>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <p>© 2026 NovaCart. All rights reserved.</p>
      <div class="footer-links">
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Privacy Policy</a>
      </div>
    </div>
  </footer>

  <div id="toast" class="toast"></div>
  <script src="script.js"></script>
</body>
</html>
