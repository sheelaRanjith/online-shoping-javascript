<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NovaCart | Products</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-page="products">
  <header class="site-header">
    <nav class="navbar container">
      <a href="index.html" class="logo">Nova<span>Cart</span></a>
      <button class="menu-toggle" id="menu-toggle" aria-label="Toggle menu">☰</button>
      <div class="nav-menu" id="nav-menu">
        <a href="index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="contact.html">Contact</a>
        <a href="orders.html">Orders</a>
        <a href="auth.html">Login</a>
      </div>
      <div class="nav-actions">
        <input type="text" id="product-search" placeholder="Search products..." aria-label="Search products" />
        <a href="cart.html" class="cart-link" aria-label="Cart">Cart <span id="cart-count" class="badge">0</span></a>
      </div>
    </nav>
  </header>

  <main class="container section">
    <div class="section-header"><h1>Products</h1></div>

    <div class="filters">
      <select id="category-filter">
        <option value="All">All Categories</option>
      </select>
      <select id="price-filter">
        <option value="all">All Prices</option>
        <option value="0-50">$0 - $50</option>
        <option value="51-100">$51 - $100</option>
        <option value="101-9999">$101+</option>
      </select>
    </div>

    <div id="products-grid" class="product-grid"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-grid">
      <p>© 2026 NovaCart. All rights reserved.</p>
      <div class="footer-links">
        <a href="contact.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="privacy.html">Privacy Policy</a>
        <a href="terms.html">Terms</a>
      </div>
    </div>
  </footer>

  <div id="toast" class="toast"></div>
  <script src="script.js"></script>
</body>
</html>
